name: test-e2e-deploy

on:
  workflow_dispatch:
    inputs:
      nextjsRef:
        description: 'Next.js repo ref (branch/tag/SHA)'
        default: 'v16.2.1'
        type: string
  # Uncomment for nightly runs:
  # schedule:
  #   - cron: '0 2 * * *'

jobs:
  build:
    name: Build Next.js + adapter
    runs-on: ubuntu-latest-8-core
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          path: adapter

      - uses: actions/checkout@v4
        with:
          repository: vercel/next.js
          ref: ${{ inputs.nextjsRef || 'canary' }}
          path: nextjs
          fetch-depth: 25

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Setup pnpm
        run: npm i -g corepack@0.31 && corepack enable

      - name: Install & build Next.js
        working-directory: nextjs
        run: pnpm install && pnpm build && pnpm install

      - name: Install Playwright
        working-directory: nextjs
        run: pnpm playwright install --with-deps chromium

      - name: Build adapter
        working-directory: adapter
        run: pnpm install && pnpm build

      # Pack adapter as tarball — avoids symlink issues with test fixtures
      # and matches the approach used by adapter-bun.
      - name: Pack adapter
        working-directory: adapter
        run: npm pack --pack-destination "${{ github.workspace }}"

      - uses: actions/cache/save@v4
        with:
          path: |
            nextjs
            adapter
            ~/.cache/ms-playwright
            ${{ github.workspace }}/solcreek-adapter-creek-*.tgz
          key: build-${{ github.sha }}-${{ github.run_id }}

  test:
    name: Tests (${{ matrix.group }})
    needs: build
    runs-on: ubuntu-latest-8-core
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        group:
          [
            1/16, 2/16, 3/16, 4/16,
            5/16, 6/16, 7/16, 8/16,
            9/16, 10/16, 11/16, 12/16,
            13/16, 14/16, 15/16, 16/16,
          ]
    steps:
      - uses: actions/cache/restore@v4
        with:
          path: |
            nextjs
            adapter
            ~/.cache/ms-playwright
            ${{ github.workspace }}/solcreek-adapter-creek-*.tgz
          key: build-${{ github.sha }}-${{ github.run_id }}

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Setup pnpm
        run: npm i -g corepack@0.31 && corepack enable

      - name: Ensure Playwright browser
        working-directory: nextjs
        run: pnpm playwright install chromium

      - name: Make scripts executable
        run: |
          chmod +x adapter/scripts/e2e-deploy.sh
          chmod +x adapter/scripts/e2e-logs.sh
          chmod +x adapter/scripts/e2e-cleanup.sh

      - name: Run deploy tests
        working-directory: nextjs
        env:
          NEXT_TEST_MODE: deploy
          NEXT_E2E_TEST_TIMEOUT: 240000
          # Comma-separated — first entry is Next.js's canonical baseline of
          # failing/flakey tests across all adapters; second is our
          # adapter-specific exclusions (inapplicable tests only — native
          # addons, multi-worker forwarding, etc.). \`get-test-filter.js\`
          # merges \`suites.*.failed\`, \`rules.include\`, and \`rules.exclude\`
          # across all manifests.
          NEXT_EXTERNAL_TESTS_FILTERS: test/deploy-tests-manifest.json,${{ github.workspace }}/adapter/test/deploy-tests-manifest.adapter-creek.json
          ADAPTER_DIR: ${{ github.workspace }}/adapter
          ADAPTER_TARBALL: ${{ github.workspace }}/solcreek-adapter-creek-0.1.0.tgz
          IS_TURBOPACK_TEST: 1
          NEXT_TEST_JOB: 1
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_TEST_DEPLOY_SCRIPT_PATH: ${{ github.workspace }}/adapter/scripts/e2e-deploy.sh
          NEXT_TEST_DEPLOY_LOGS_SCRIPT_PATH: ${{ github.workspace }}/adapter/scripts/e2e-logs.sh
          NEXT_TEST_CLEANUP_SCRIPT_PATH: ${{ github.workspace }}/adapter/scripts/e2e-cleanup.sh
        # CONCURRENCY=1: each test fixture runs solo within a job.
        # Parallelism comes from the 16-job matrix, not from within each
        # job. This eliminates deploy-timeout flakes from concurrent
        # fixture builds competing for CPU on the shared runner. Wall
        # time stays similar because the matrix fans out 16 jobs.
        run: node run-tests.js --timings -g ${{ matrix.group }} -c 1 --type e2e
